name: Build Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: frontend/pubspec.yaml

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > frontend/android/app/release.jks

      - name: Create key.properties
        run: |
          cat > frontend/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Get dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Run build_runner
        working-directory: frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --split-per-abi --release

      - name: Rename universal APK
        run: |
          mv frontend/build/app/outputs/flutter-apk/app-universal-release.apk \
             frontend/build/app/outputs/flutter-apk/woolytube-universal.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            frontend/build/app/outputs/flutter-apk/woolytube-universal.apk
            frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            frontend/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            frontend/build/app/outputs/flutter-apk/app-x86_64-release.apk
